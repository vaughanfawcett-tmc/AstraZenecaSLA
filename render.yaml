services:
  - type: web
    name: astrazeneca-sla
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        sync: false  # set in Render dashboard, never committed
      - key: APP_PASSWORD
        sync: false  # set in Render dashboard — Amy's gate password
      # Optional alternative providers (commented out — pick one)
      # - key: AZURE_OPENAI_API_KEY
      #   sync: false
      # - key: AZURE_OPENAI_ENDPOINT
      #   sync: false
      # - key: OPENROUTER_API_KEY
      #   sync: false
